# prefix を C-t に変更（Emacs バインドとの衝突を回避）
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# マウス操作を有効化（スクロール・ペイン選択・リサイズ）
set -g mouse on

# OSC 52 でクリップボード同期（SSH 経由でも動作）
set -s set-clipboard on

# マウスドラッグ選択時に自動でシステムクリップボードにコピー
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || true"

# ペイン分割（直感的なキーバインド）
bind - split-window -v
bind \\ split-window -h

# Escape キーの遅延を解消
set -sg escape-time 0

# スクロールバック行数を拡大
set -g history-limit 30000

# ウィンドウ・ペイン番号を1始まりに
set -g base-index 1
set -g pane-base-index 1

# ウィンドウを閉じた時に番号を詰める
set -g renumber-windows on

# ペイン分割線（太線 + アクティブは青）
set -g pane-border-lines heavy
set -g pane-border-style "fg=colour241"
set -g pane-active-border-style "fg=colour39"

# ペイン番号を分割線上に常時表示
set -g pane-border-status top
set -g pane-border-format " #P "

# C-t q の番号表示時間を延長（デフォルト0.5秒）
set -g display-panes-time 3000

# ステータスバー
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #S "
set -g status-left-style "bg=colour241,fg=white"
set -g status-right " %m/%d %H:%M "
set -g status-right-style "bg=colour241,fg=white"
# ウィンドウ名をスクリプトで制御するため自動リネームを無効化
set -g automatic-rename off
set -g allow-rename on
# ペイン・ウィンドウ切り替え時にアクティブペインの Git 情報でウィンドウ名を更新
set-hook -g after-select-pane "run-shell -b '$HOME/.config/tmux/update-window-title.sh \"#{pane_current_path}\" \"#{window_id}\"'"
set-hook -g after-select-window "run-shell -b '$HOME/.config/tmux/update-window-title.sh \"#{pane_current_path}\" \"#{window_id}\"'"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour39,fg=black,bold"

# ログ設定
run-shell "mkdir -p $HOME/.local/share/tmux/logs"

# 新しいペインで自動的にログ記録を開始
set-hook -g session-created    "pipe-pane -o 'cat >> $HOME/.local/share/tmux/logs/#S_#I.#P_#{pane_pid}.log'"
set-hook -g after-new-window   "pipe-pane -o 'cat >> $HOME/.local/share/tmux/logs/#S_#I.#P_#{pane_pid}.log'"
set-hook -g after-split-window "pipe-pane -o 'cat >> $HOME/.local/share/tmux/logs/#S_#I.#P_#{pane_pid}.log'"

# 90日以上経過したログを自動削除（tmux 起動時に実行）
run-shell "find $HOME/.local/share/tmux/logs -name '*.log' -mtime +90 -delete 2>/dev/null || true"
