# prefix を C-t に変更（Emacs バインドとの衝突を回避）
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# マウス操作を有効化（スクロール・ペイン選択・リサイズ）
set -g mouse on

# マウスドラッグ選択時に自動でシステムクリップボードにコピー
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ログ設定
run-shell "mkdir -p $HOME/.local/share/tmux/logs"

# 新しいペインで自動的にログ記録を開始
set-hook -g session-created    "pipe-pane -o 'cat >> $HOME/.local/share/tmux/logs/#S_#I.#P_#{pane_created}.log'"
set-hook -g after-new-window   "pipe-pane -o 'cat >> $HOME/.local/share/tmux/logs/#S_#I.#P_#{pane_created}.log'"
set-hook -g after-split-window "pipe-pane -o 'cat >> $HOME/.local/share/tmux/logs/#S_#I.#P_#{pane_created}.log'"

# 90日以上経過したログを自動削除（tmux 起動時に実行）
run-shell "find $HOME/.local/share/tmux/logs -name '*.log' -mtime +90 -delete 2>/dev/null || true"
